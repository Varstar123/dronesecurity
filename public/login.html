<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · Police Control Center</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='-1 -1 26 26' fill='none' stroke='%23ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M19.07 4.93A10 10 0 0 0 6.99 3.34'/><path d='M4 6h.01'/><path d='M2.29 9.62A10 10 0 1 0 21.31 8.35'/><path d='M16.24 7.76A6 6 0 1 0 8.23 16.67'/><path d='M12 18h.01'/><path d='M17.99 11.66A6 6 0 0 1 15.77 16.67'/><circle cx='12' cy='12' r='2'/><path d='m13.41 10.59 5.66-5.66'/></svg>" />
  <link rel="stylesheet" href="/css/style.css" />
  <script>try{var t=localStorage.getItem('sd-theme');if(t)document.documentElement.dataset.theme=t;}catch(e){}</script>
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo"><i data-lucide="radar"></i></div>
    <h1>Police Control Center</h1>
    <p class="auth-sub">Smart City Drone Security System</p>
    <form id="loginForm" class="auth-form" autocomplete="on">
      <label class="field">Username</label>
      <input id="username" name="username" autocomplete="username" autofocus />
      <label class="field">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" />
      <div class="auth-error" id="authError"></div>
      <button class="btn primary auth-btn" id="loginBtn" type="submit"><i data-lucide="log-in"></i> Sign in</button>
    </form>
    <p class="auth-foot">Group 17 · GEC Kozhikode</p>
  </div>

  <script src="https://unpkg.com/lucide@1.23.0/dist/umd/lucide.min.js"></script>
  <script>window.addEventListener('DOMContentLoaded', () => window.lucide && lucide.createIcons());</script>
  <script type="module" src="/js/login.js"></script>
</body>
</html>
